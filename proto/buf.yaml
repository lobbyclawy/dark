version: v2
lint:
  use:
    - STANDARD
  except:
    - FIELD_LOWER_SNAKE_CASE
    - PACKAGE_SAME_GO_PACKAGE
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - IMPORT_USED
breaking:
  use:
    - FILE
  ignore:
    # Intentional breaking changes to match Go arkd upstream proto API
    - ark/v1/wallet_service.proto
    # Intentional go_package change: arkd → dark rename
    - ark/v1/signer_service.proto
    - ark/v1/signer_manager_service.proto
    # Intentional field reordering to align GetInfoResponse with Go reference (#314)
    - ark/v1/ark_service.proto
