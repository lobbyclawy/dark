syntax = "proto3";

package ark.v1;

import "ark/v1/confidential.proto";

// Outpoint identifies a transaction output.
message Outpoint {
  string txid = 1;
  uint32 vout = 2;
}

// Input represents a transaction input with optional tapscripts.
message Input {
  Outpoint outpoint = 1;
  Tapscripts taproot_tree = 2;
}

// TransparentVtxoMarker is an empty marker used by the `vtxo_body` oneof on
// `Vtxo` to explicitly tag a VTXO as transparent. Its presence is purely
// informational — transparent VTXOs carry their entire payload in the legacy
// scalar fields (`amount`, `script`, …) directly on `Vtxo`, and clients
// MUST continue to read those fields regardless of whether this marker is set.
//
// In other words: an old client that never inspects `vtxo_body` keeps working,
// because the transparent payload is duplicated outside the oneof.
message TransparentVtxoMarker {}

// Vtxo represents a virtual transaction output.
//
// Wire-evolution scheme
// ---------------------
// Field numbers 1-14 are the legacy transparent fields and are wire-compatible
// with the original Go arkd schema. Field numbers 15-99 are reserved for
// future additive extensions to the transparent schema. Field numbers
// 100-199 are reserved for the confidential-VTXO additions introduced in
// CV-M2 (#531). The first such addition is the `vtxo_body` oneof at field
// number 100, which lets a VTXO be tagged as transparent or carry a
// `ConfidentialVtxo` payload.
//
// Backward compatibility
// ----------------------
// - Transparent VTXOs serialised under the old schema deserialise unchanged
//   under this schema, because field numbers 1-14 are untouched and the new
//   `vtxo_body` oneof is optional.
// - Old clients that do not understand `vtxo_body` simply ignore it (proto3
//   skips unknown fields), so confidential payloads round-trip safely through
//   transparent-only middleware.
// - New servers SHOULD set `vtxo_body = transparent { ... }` for clarity on
//   newly-minted transparent VTXOs but are not required to backfill it.
message Vtxo {
  Outpoint outpoint = 1;
  uint64 amount = 2;
  string script = 3;
  int64 created_at = 4;
  int64 expires_at = 5;
  repeated string commitment_txids = 6;
  bool is_preconfirmed = 7;
  bool is_swept = 8;
  bool is_unrolled = 9;
  bool is_spent = 10;
  string spent_by = 11;
  string settled_by = 12;
  string ark_txid = 13;
  repeated VtxoAsset assets = 14;

  // Reserved for future transparent-schema extensions.
  reserved 15 to 99;

  // Confidential-VTXO body (#531). The oneof is *additive* with respect to the
  // legacy fields above: when `transparent` is selected (or the oneof is
  // unset), the legacy `amount`/`script` fields define the payload; when
  // `confidential` is selected, the legacy `amount` MUST be zero and `script`
  // MUST be empty, and the real payload lives in `ConfidentialVtxo`.
  oneof vtxo_body {
    TransparentVtxoMarker transparent = 100;
    ConfidentialVtxo confidential = 101;
  }
}

// VtxoAsset represents an asset embedded in a VTXO.
message VtxoAsset {
  string asset_id = 1;
  uint64 amount = 2;
}

// Tapscripts holds a list of taproot scripts.
message Tapscripts {
  repeated string scripts = 1;
}

// Round represents a protocol round.
message Round {
  string id = 1;
  int64 starting_timestamp = 2;
  int64 ending_timestamp = 3;
  string stage = 4;
  string commitment_txid = 5;
  bool failed = 6;
}

// RoundDetails includes full round information.
message RoundDetails {
  string id = 1;
  int64 starting_timestamp = 2;
  int64 ending_timestamp = 3;
  string stage = 4;
  string commitment_txid = 5;
  bool failed = 6;
  uint32 intent_count = 7;
}

// Intent represents a registration intent with proof.
message Intent {
  string proof = 1;
  string message = 2;
  // Optional: hex-encoded compressed public key of the delegate submitting this
  // intent on behalf of the VTXO owner. When set, the server verifies that the
  // BIP-322 proof was signed by the owner and accepts the delegate's cosigner key.
  string delegate_pubkey = 3;
}

// ServiceStatus reports the status of a server subsystem.
message ServiceStatus {
  string name = 1;
  bool available = 2;
  string details = 3;
}

// Output specifies a payment destination.
message Output {
  oneof destination {
    string vtxo_script = 1;
    string onchain_address = 2;
  }
  uint64 amount = 3;
}

// IntentInfo contains full intent details.
// Shared between ArkService and AdminService.
message IntentInfo {
  string intent_id = 1;
  string pubkey = 2;
  uint64 amount = 3;
  string proof_message = 4;
  repeated string cosigners_public_keys = 5;
  repeated BoardingInputInfo boarding_inputs = 6;
  string status = 7;
  int64 created_at = 8;
  string round_id = 9;
}

// BoardingInputInfo represents an on-chain UTXO being boarded into Ark.
message BoardingInputInfo {
  Outpoint outpoint = 1;
  uint64 amount = 2;
}

// FeeInfo describes the fee structure for the server.
message FeeInfo {
  IntentFeeInfo intent_fee = 1;
  string tx_fee_rate = 2;
}

// IntentFeeInfo describes the per-intent fee rates.
message IntentFeeInfo {
  string offchain_input = 1;
  string offchain_output = 2;
  string onchain_input = 3;
  string onchain_output = 4;
}
