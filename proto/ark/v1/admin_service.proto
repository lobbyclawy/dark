syntax = "proto3";

package ark.v1;

import "ark/v1/types.proto";

// AdminService is the operator API for the Ark protocol server.
service AdminService {
  // GetStatus returns the current server status.
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);

  // GetRoundDetails returns detailed information about a specific round.
  rpc GetRoundDetails(GetRoundDetailsRequest) returns (GetRoundDetailsResponse);

  // GetRounds returns a list of round IDs filtered by time range.
  rpc GetRounds(GetRoundsRequest) returns (GetRoundsResponse);

  // ListIntents returns all pending intents.
  rpc ListIntents(ListIntentsRequest) returns (ListIntentsResponse);

  // DeleteIntents removes intents by their IDs.
  rpc DeleteIntents(DeleteIntentsRequest) returns (DeleteIntentsResponse);

  // GetIntentFees returns the current intent fee configuration.
  rpc GetIntentFees(GetIntentFeesRequest) returns (GetIntentFeesResponse);

  // UpdateIntentFees updates the intent fee configuration.
  rpc UpdateIntentFees(UpdateIntentFeesRequest) returns (UpdateIntentFeesResponse);

  // ClearIntentFees resets intent fees to defaults.
  rpc ClearIntentFees(ClearIntentFeesRequest) returns (ClearIntentFeesResponse);

  // GetScheduledSweep returns the next scheduled sweep details.
  rpc GetScheduledSweep(GetScheduledSweepRequest) returns (GetScheduledSweepResponse);

  // Sweep triggers an immediate sweep of expired VTXOs.
  rpc Sweep(SweepRequest) returns (SweepResponse);

  // GetExpiringLiquidity returns VTXOs expiring within a time window.
  rpc GetExpiringLiquidity(GetExpiringLiquidityRequest) returns (GetExpiringLiquidityResponse);

  // GetRecoverableLiquidity returns liquidity that can be recovered.
  rpc GetRecoverableLiquidity(GetRecoverableLiquidityRequest) returns (GetRecoverableLiquidityResponse);

  // RevokeAuth revokes an authentication token.
  rpc RevokeAuth(RevokeAuthRequest) returns (RevokeAuthResponse);

  // GetScheduledSessionConfig returns the scheduled session configuration.
  rpc GetScheduledSessionConfig(GetScheduledSessionConfigRequest) returns (GetScheduledSessionConfigResponse);

  // UpdateScheduledSessionConfig updates the scheduled session configuration.
  rpc UpdateScheduledSessionConfig(UpdateScheduledSessionConfigRequest) returns (UpdateScheduledSessionConfigResponse);

  // ClearScheduledSessionConfig resets the scheduled session configuration.
  rpc ClearScheduledSessionConfig(ClearScheduledSessionConfigRequest) returns (ClearScheduledSessionConfigResponse);

  // ListConvictions returns all convicted participants (legacy).
  rpc ListConvictions(ListConvictionsRequest) returns (ListConvictionsResponse);

  // DeleteConviction removes a conviction record (legacy).
  rpc DeleteConviction(DeleteConvictionRequest) returns (DeleteConvictionResponse);

  // BanParticipant bans a participant from future rounds (legacy).
  rpc BanParticipant(BanParticipantRequest) returns (BanParticipantResponse);

  // --- Go admin.proto conviction RPCs ---

  // GetConvictions returns convictions by their IDs.
  rpc GetConvictions(GetConvictionsRequest) returns (GetConvictionsResponse);

  // GetConvictionsInRange returns convictions created within a time range.
  rpc GetConvictionsInRange(GetConvictionsInRangeRequest) returns (GetConvictionsInRangeResponse);

  // GetConvictionsByRound returns convictions for a specific round.
  rpc GetConvictionsByRound(GetConvictionsByRoundRequest) returns (GetConvictionsByRoundResponse);

  // GetActiveScriptConvictions returns active convictions for a script.
  rpc GetActiveScriptConvictions(GetActiveScriptConvictionsRequest) returns (GetActiveScriptConvictionsResponse);

  // PardonConviction removes a conviction (pardons the offender).
  rpc PardonConviction(PardonConvictionRequest) returns (PardonConvictionResponse);

  // BanScript bans a specific script from participation.
  rpc BanScript(BanScriptRequest) returns (BanScriptResponse);

  // CreateNote creates bearer notes (operator-funded onboarding).
  rpc CreateNote(CreateNoteRequest) returns (CreateNoteResponse);
}

// --- Existing messages ---

message GetStatusRequest {}
message GetStatusResponse {
  string version = 1;
  string network = 2;
  uint64 uptime_secs = 3;
  uint32 active_rounds = 4;
  uint32 total_participants = 5;
  uint64 total_vtxos = 6;
  string signer_pubkey = 7;
}

message GetRoundDetailsRequest {
  string round_id = 1;
}
message GetRoundDetailsResponse {
  string round_id = 1;
  int64 started_at = 2;
  int64 ended_at = 3;
  string commitment_txid = 4;
  uint32 intent_count = 5;
}

message GetRoundsRequest {
  int64 after = 1;
  int64 before = 2;
}
message GetRoundsResponse {
  repeated string round_ids = 1;
}

// --- New messages: Intents ---
// Note: IntentInfo is now defined in types.proto for shared use.

message ListIntentsRequest {}
message ListIntentsResponse {
  repeated IntentInfo intents = 1;
}

message DeleteIntentsRequest {
  repeated string intent_ids = 1;
}
message DeleteIntentsResponse {
  uint32 deleted_count = 1;
}

// --- New messages: Intent Fees ---

message IntentFeeConfig {
  uint64 base_fee_sats = 1;
  uint64 fee_rate_ppm = 2; // fee rate in parts per million (e.g. 1000 = 0.1%)
}

message GetIntentFeesRequest {}
message GetIntentFeesResponse {
  IntentFeeConfig fees = 1;
}

message UpdateIntentFeesRequest {
  IntentFeeConfig fees = 1;
}
message UpdateIntentFeesResponse {
  IntentFeeConfig fees = 1;
}

message ClearIntentFeesRequest {}
message ClearIntentFeesResponse {}

// --- New messages: Sweep ---

message GetScheduledSweepRequest {}
message GetScheduledSweepResponse {
  int64 scheduled_at = 1;
  uint32 vtxo_count = 2;
  uint64 total_amount = 3;
}

message SweepRequest {}
message SweepResponse {
  string sweep_txid = 1;
  uint32 swept_count = 2;
}

// --- New messages: Liquidity ---

message GetExpiringLiquidityRequest {
  int64 within_secs = 1;
}
message GetExpiringLiquidityResponse {
  uint64 total_amount = 1;
  uint32 vtxo_count = 2;
}

message GetRecoverableLiquidityRequest {}
message GetRecoverableLiquidityResponse {
  uint64 total_amount = 1;
  uint32 vtxo_count = 2;
}

// --- New messages: Auth ---

message RevokeAuthRequest {
  string token_id = 1;
}
message RevokeAuthResponse {}

// --- New messages: Session Config ---

message SessionConfig {
  uint32 round_interval_secs = 1;
  uint32 round_lifetime_secs = 2;
  uint32 max_intents_per_round = 3;
}

message GetScheduledSessionConfigRequest {}
message GetScheduledSessionConfigResponse {
  SessionConfig config = 1;
}

message UpdateScheduledSessionConfigRequest {
  SessionConfig config = 1;
}
message UpdateScheduledSessionConfigResponse {
  SessionConfig config = 1;
}

message ClearScheduledSessionConfigRequest {}
message ClearScheduledSessionConfigResponse {}

// --- Convictions (legacy) ---

message ListConvictionsRequest {}
message ListConvictionsResponse {
  repeated Conviction convictions = 1;
}

message DeleteConvictionRequest {
  string conviction_id = 1;
}
message DeleteConvictionResponse {}

message BanParticipantRequest {
  string pubkey = 1;
  string reason = 2;
}
message BanParticipantResponse {
  bool success = 1;
}

// --- Conviction types (Go admin.proto aligned) ---

enum CrimeType {
  CRIME_TYPE_UNSPECIFIED = 0;
  CRIME_TYPE_MUSIG2_NONCE_SUBMISSION = 1;
  CRIME_TYPE_MUSIG2_SIGNATURE_SUBMISSION = 2;
  CRIME_TYPE_MUSIG2_INVALID_SIGNATURE = 3;
  CRIME_TYPE_FORFEIT_SUBMISSION = 4;
  CRIME_TYPE_FORFEIT_INVALID_SIGNATURE = 5;
  CRIME_TYPE_BOARDING_INPUT_SUBMISSION = 6;
  CRIME_TYPE_MANUAL_BAN = 7;
}

enum ConvictionType {
  CONVICTION_TYPE_UNSPECIFIED = 0;
  CONVICTION_TYPE_SCRIPT = 1;
}

message Conviction {
  string id = 1;
  ConvictionType type = 2;
  int64 created_at = 3;
  int64 expires_at = 4; // 0 if never expires
  bool pardoned = 5;
  string script = 6;    // Only set for script convictions
  CrimeType crime_type = 7;
  string round_id = 8;
  string reason = 9;
}

// --- Conviction RPCs (Go admin.proto aligned) ---

message GetConvictionsRequest {
  repeated string ids = 1;
}
message GetConvictionsResponse {
  repeated Conviction convictions = 1;
}

message GetConvictionsInRangeRequest {
  int64 from = 1; // Unix timestamp
  int64 to = 2;   // Unix timestamp
}
message GetConvictionsInRangeResponse {
  repeated Conviction convictions = 1;
}

message GetConvictionsByRoundRequest {
  string round_id = 1;
}
message GetConvictionsByRoundResponse {
  repeated Conviction convictions = 1;
}

message GetActiveScriptConvictionsRequest {
  string script = 1;
}
message GetActiveScriptConvictionsResponse {
  repeated Conviction convictions = 1;
}

message PardonConvictionRequest {
  string id = 1;
}
message PardonConvictionResponse {}

message BanScriptRequest {
  string script = 1;
  int64 ban_duration = 2; // 0 = permanent ban
  string reason = 3;
}
message BanScriptResponse {}

// --- CreateNote (Go admin.proto aligned) ---

message CreateNoteRequest {
  uint32 amount = 1;
  uint32 quantity = 2;
}
message CreateNoteResponse {
  repeated string notes = 1;
}
