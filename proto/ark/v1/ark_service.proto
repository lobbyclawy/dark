syntax = "proto3";

package ark.v1;

import "ark/v1/types.proto";
import "ark/v1/confidential_tx.proto";

// ArkService is the user-facing API for the Ark protocol server.
service ArkService {
  // GetInfo returns server information and parameters.
  rpc GetInfo(GetInfoRequest) returns (GetInfoResponse);

  // ─────────────────────────────────────────────────────────────────────────
  // Round Registration (Go arkd parity)
  // ─────────────────────────────────────────────────────────────────────────

  // RegisterIntent registers a user's intent for the next available round.
  // This is the Go arkd-compatible API — uses BIP-322 intent proofs.
  rpc RegisterIntent(RegisterIntentRequest) returns (RegisterIntentResponse);

  // ConfirmRegistration confirms participation in the current batch.
  // Called after BatchStarted event to acknowledge the VTXO tree.
  rpc ConfirmRegistration(ConfirmRegistrationRequest) returns (ConfirmRegistrationResponse);

  // GetIntent retrieves an intent by txid filter.
  rpc GetIntent(GetIntentRequest) returns (GetIntentResponse);

  // ─────────────────────────────────────────────────────────────────────────
  // MuSig2 Tree Signing (Go arkd parity)
  // ─────────────────────────────────────────────────────────────────────────

  // SubmitTreeNonces submits MuSig2 tree nonces for a batch.
  rpc SubmitTreeNonces(SubmitTreeNoncesRequest) returns (SubmitTreeNoncesResponse);

  // SubmitTreeSignatures submits MuSig2 tree partial signatures.
  rpc SubmitTreeSignatures(SubmitTreeSignaturesRequest) returns (SubmitTreeSignaturesResponse);

  // SubmitSignedForfeitTxs submits signed forfeit transactions.
  rpc SubmitSignedForfeitTxs(SubmitSignedForfeitTxsRequest) returns (SubmitSignedForfeitTxsResponse);

  // ─────────────────────────────────────────────────────────────────────────
  // Legacy RPCs (deprecated — use above for Go arkd parity)
  // ─────────────────────────────────────────────────────────────────────────

  // RegisterForRound registers a user's intent for the next available round.
  // DEPRECATED: Use RegisterIntent instead.
  rpc RegisterForRound(RegisterForRoundRequest) returns (RegisterForRoundResponse);

  // RequestExit initiates a unilateral exit for the given VTXOs.
  // Returns the VTXO tree branch PSBTs (root→leaf) that the client must
  // sign and broadcast on-chain.
  rpc RequestExit(RequestExitRequest) returns (RequestExitResponse);

  // GetVtxos returns VTXOs for a given public key.
  // DEPRECATED: Use IndexerService.GetVtxos instead.
  rpc GetVtxos(GetVtxosRequest) returns (GetVtxosResponse);

  // ListRounds returns a paginated list of rounds.
  // DEPRECATED: Use AdminService.GetRounds instead.
  rpc ListRounds(ListRoundsRequest) returns (ListRoundsResponse);

  // GetRound returns details for a specific round.
  // DEPRECATED: Use AdminService.GetRoundDetails instead.
  rpc GetRound(GetRoundRequest) returns (GetRoundResponse);

  // GetRoundAnnouncements streams public stealth announcements in stable order.
  rpc GetRoundAnnouncements(GetRoundAnnouncementsRequest) returns (stream RoundAnnouncement);

  // ─────────────────────────────────────────────────────────────────────────
  // Event Streaming
  // ─────────────────────────────────────────────────────────────────────────

  // GetEventStream opens a server-streaming connection for round lifecycle events.
  rpc GetEventStream(GetEventStreamRequest) returns (stream RoundEvent);

  // GetTransactionsStream opens a server-streaming connection for transaction events.
  rpc GetTransactionsStream(GetTransactionsStreamRequest) returns (stream TransactionEvent);

  // UpdateStreamTopics updates the set of event topics the client subscribes to.
  rpc UpdateStreamTopics(UpdateStreamTopicsRequest) returns (UpdateStreamTopicsResponse);

  // ─────────────────────────────────────────────────────────────────────────
  // Fee & Intent Management
  // ─────────────────────────────────────────────────────────────────────────

  // EstimateIntentFee estimates the fee for a set of inputs and outputs.
  rpc EstimateIntentFee(EstimateIntentFeeRequest) returns (EstimateIntentFeeResponse);

  // DeleteIntent removes a previously registered intent.
  rpc DeleteIntent(DeleteIntentRequest) returns (DeleteIntentResponse);

  // ─────────────────────────────────────────────────────────────────────────
  // Offchain Transactions
  // ─────────────────────────────────────────────────────────────────────────

  // SubmitTx submits an offchain transaction spending VTXOs.
  rpc SubmitTx(SubmitTxRequest) returns (SubmitTxResponse);

  // SubmitConfidentialTransaction submits a confidential off-chain transaction
  // that spends confidential VTXOs and creates new confidential outputs (#537).
  //
  // This RPC is a deliberate parallel to SubmitTx rather than a `oneof` arm
  // inside SubmitTxRequest. Reasoning is captured in `confidential_tx.proto`,
  // but in short: a parallel method preserves the exact wire shape of the
  // transparent SubmitTx path, simplifies operator rollout (the confidential
  // path can be enabled/disabled without touching the transparent code path),
  // and accommodates the materially different response shape (txid + structured
  // error enum vs. the legacy transparent response). See #537 for context.
  rpc SubmitConfidentialTransaction(SubmitConfidentialTransactionRequest)
      returns (SubmitConfidentialTransactionResponse);

  // FinalizeTx finalizes a previously submitted offchain transaction.
  rpc FinalizeTx(FinalizeTxRequest) returns (FinalizeTxResponse);

  // GetPendingTx returns the status of a pending offchain transaction.
  rpc GetPendingTx(GetPendingTxRequest) returns (GetPendingTxResponse);

  // FinalizePendingTxs finalizes any pending off-chain transactions for the caller.
  // Used in reconnect scenarios where FinalizeTx was not called after SubmitTx.
  rpc FinalizePendingTxs(FinalizePendingTxsRequest) returns (FinalizePendingTxsResponse);

  // IssueAsset issues a new asset token on the Ark network.
  rpc IssueAsset(IssueAssetRequest) returns (IssueAssetResponse);

  // ReissueAsset reissues (mints more of) an existing asset.
  rpc ReissueAsset(ReissueAssetRequest) returns (ReissueAssetResponse);

  // BurnAsset burns (destroys) units of an existing asset.
  rpc BurnAsset(BurnAssetRequest) returns (BurnAssetResponse);

  // RedeemNotes redeems Ark notes for on-chain or off-chain value.
  rpc RedeemNotes(RedeemNotesRequest) returns (RedeemNotesResponse);
}

message GetInfoRequest {}
message GetInfoResponse {
  string version = 1;
  string signer_pubkey = 2;
  string forfeit_pubkey = 3;
  string forfeit_address = 4;
  string checkpoint_tapscript = 5;
  string network = 6;
  int64 session_duration = 7;
  int64 unilateral_exit_delay = 8;
  int64 boarding_exit_delay = 9;
  int64 utxo_min_amount = 10;
  int64 utxo_max_amount = 11;
  int64 vtxo_min_amount = 12;
  int64 vtxo_max_amount = 13;
  int64 dust = 14;
  FeeInfo fees = 15;
  ScheduledSession scheduled_session = 16;
  repeated DeprecatedSigner deprecated_signers = 17;
  map<string, string> service_status = 18;
  string digest = 19;
  int64 max_tx_weight = 20;
  int64 max_op_return_outputs = 21;
  // dark-rs extra fields (not in Go arkd)
  uint32 public_unilateral_exit_delay = 22;
}

// ScheduledSession describes the next scheduled round session.
message ScheduledSession {
  int64 next_start_time = 1;
  int64 next_end_time = 2;
  int64 period = 3;
  int64 duration = 4;
  FeeInfo fees = 5;
}

message DeprecatedSigner {
  string pubkey = 1;
  int64 cutoff_date = 2;
}

message RegisterForRoundRequest {
  string pubkey = 1;
  uint64 amount = 2;
  repeated Input inputs = 3;
}
message RegisterForRoundResponse {
  string intent_id = 1;
  string round_id = 2;
}

message RequestExitRequest {
  repeated Outpoint vtxo_ids = 1;
  string destination = 2;
}
message RequestExitResponse {
  string exit_id = 1;
  string status = 2;
  // PSBTs (base64) for the VTXO tree branch from root to leaf.
  // The client must sign/finalise and broadcast these in order (root first)
  // to perform a unilateral exit.
  repeated string branch_psbts = 3;
}

message GetVtxosRequest {
  string pubkey = 1;
}
message GetVtxosResponse {
  repeated Vtxo spendable = 1;
  repeated Vtxo spent = 2;
}

message ListRoundsRequest {
  int64 after = 1;
  int64 before = 2;
  uint32 limit = 3;
  uint32 offset = 4;
}
message ListRoundsResponse {
  repeated Round rounds = 1;
}

message GetRoundRequest {
  string round_id = 1;
}
message GetRoundResponse {
  RoundDetails round = 1;
}

message GetRoundAnnouncementsRequest {
  // Inclusive lower bound for round IDs. Ignored when cursor is set.
  string round_id_start = 1;
  // Inclusive upper bound for round IDs. Ignored when cursor is set.
  string round_id_end = 2;
  // Resume cursor encoded as `<round_id>\n<vtxo_id>` from the last seen item.
  string cursor = 3;
  // Maximum number of announcements to return in this stream. Zero uses the server default.
  uint32 limit = 4;
}

message RoundAnnouncement {
  // Resume cursor for fetching the next page after this item.
  string cursor = 1;
  string round_id = 2;
  string vtxo_id = 3;
  string ephemeral_pubkey = 4;
}

message GetEventStreamRequest {
  // Initial topics to subscribe to (e.g. client pubkeys).
  // Events with non-empty topic lists are only delivered when at least one
  // topic matches. Events without topics are always delivered.
  repeated string topics = 1;
}

message UpdateStreamTopicsRequest {
  // Stream ID returned in StreamStartedEvent.
  string stream_id = 1;
  // Topic update mode (Go arkd parity)
  oneof topics_change {
    ModifyTopics modify = 2;
    OverwriteTopics overwrite = 3;
  }
}

// ModifyTopics adds or removes specific topics.
message ModifyTopics {
  repeated string add_topics = 1;
  repeated string remove_topics = 2;
}

// OverwriteTopics replaces the entire topic set.
message OverwriteTopics {
  repeated string topics = 1;
}

message UpdateStreamTopicsResponse {
  // Topics that were added in this request.
  repeated string topics_added = 1;
  // Topics that were removed in this request.
  repeated string topics_removed = 2;
  // All topics currently subscribed to.
  repeated string all_topics = 3;
}

message RoundEvent {
  oneof event {
    BatchStartedEvent batch_started = 1;
    BatchFinalizationEvent batch_finalization = 2;
    BatchFinalizedEvent batch_finalized = 3;
    BatchFailedEvent batch_failed = 4;
    // MuSig2 tree signing events (Go arkd parity)
    TreeSigningStartedEvent tree_signing_started = 5;
    TreeNoncesAggregatedEvent tree_nonces_aggregated = 6;
    TreeTxEvent tree_tx = 7;
    TreeSignatureEvent tree_signature = 8;
    TreeNoncesEvent tree_nonces = 9;
    Heartbeat heartbeat = 10;
    StreamStartedEvent stream_started = 11;
  }
}

// Wire-compatible with Go arkd BatchStartedEvent
message BatchStartedEvent {
  string id = 1;
  repeated string intent_id_hashes = 2;
  int64 batch_expiry = 3;
}

// Wire-compatible with Go arkd BatchFinalizationEvent
message BatchFinalizationEvent {
  string id = 1;
  string commitment_tx = 2;
}

// Wire-compatible with Go arkd BatchFinalizedEvent
message BatchFinalizedEvent {
  string id = 1;
  string commitment_txid = 2;
}

message BatchFailedEvent {
  string id = 1;
  string reason = 2;
}

message RoundHeartbeatEvent {
  int64 timestamp = 1;
}

// TreeNoncesEvent — MuSig2 nonce exchange
message TreeNoncesEvent {
  string id = 1;
  repeated string topic = 2;
  string txid = 3;
  map<string, string> nonces = 4;
}

// Heartbeat keepalive (Go arkd uses empty Heartbeat)
message Heartbeat {
}

message EstimateIntentFeeRequest {
  repeated string input_vtxo_ids = 1;
  repeated Output outputs = 2;
}

message EstimateIntentFeeResponse {
  uint64 fee_sats = 1;
  uint64 fee_rate_sats_per_vb = 2;
}

message DeleteIntentRequest {
  // An intent proof that includes any of the inputs of the intent to be
  // deleted, proving ownership of that intent.
  Intent intent = 1;
}

message DeleteIntentResponse {}

// Offchain transaction messages

message SignedVtxoInput {
  string vtxo_id = 1;
  bytes signed_tx = 2;
}

message SubmitTxRequest {
  string signed_ark_tx = 1;
  repeated string checkpoint_txs = 2;
}

message SubmitTxResponse {
  string ark_txid = 1;
  string final_ark_tx = 2;
  repeated string signed_checkpoint_txs = 3;
}

message FinalizeTxRequest {
  string ark_txid = 1;
  repeated string final_checkpoint_txs = 2;
}

message FinalizeTxResponse {}

message PendingTx {
  string ark_txid = 1;
  string final_ark_tx = 2;
  repeated string signed_checkpoint_txs = 3;
}

message GetPendingTxRequest {
  oneof identifier {
    Intent intent = 1;
  }
}

message GetPendingTxResponse {
  repeated PendingTx pending_txs = 1;
}

message FinalizePendingTxsRequest {
  // Public key of the caller; server finalizes all pending txs whose inputs
  // are owned by this key. Pass empty string to finalize all pending txs.
  string pubkey = 1;
}

message FinalizePendingTxsResponse {
  // IDs of transactions that were finalized by this call.
  repeated string finalized_txids = 1;
}

// ─────────────────────────────────────────────────────────────────────────────
// RegisterIntent — Go arkd parity
// ─────────────────────────────────────────────────────────────────────────────

message RegisterIntentRequest {
  // BIP-322 intent proof (contains proof PSBT + JSON message)
  Intent intent = 1;
}

message RegisterIntentResponse {
  // Assigned intent ID
  string intent_id = 1;
}

// ─────────────────────────────────────────────────────────────────────────────
// ConfirmRegistration — Go arkd parity
// ─────────────────────────────────────────────────────────────────────────────

message ConfirmRegistrationRequest {
  // Intent ID to confirm
  string intent_id = 1;
}

message ConfirmRegistrationResponse {
  // Confirmation acknowledged
  bool confirmed = 1;
}

// ─────────────────────────────────────────────────────────────────────────────
// GetIntent — Go arkd parity
// ─────────────────────────────────────────────────────────────────────────────

message GetIntentRequest {
  // Filter by txid (commitment or virtual tx)
  string txid = 1;
}

message GetIntentResponse {
  // Intent details (type from types.proto)
  IntentInfo intent = 1;
}

// ─────────────────────────────────────────────────────────────────────────────
// MuSig2 Tree Signing — Go arkd parity
// ─────────────────────────────────────────────────────────────────────────────

message SubmitTreeNoncesRequest {
  // Batch ID (round ID)
  string batch_id = 1;
  // Cosigner public key
  string pubkey = 2;
  // Tree nonces: map from tree position to nonce bytes
  map<string, string> tree_nonces = 3;
}

message SubmitTreeNoncesResponse {
  // Acknowledgment
  bool accepted = 1;
}

message SubmitTreeSignaturesRequest {
  // Batch ID (round ID)
  string batch_id = 1;
  // Cosigner public key
  string pubkey = 2;
  // Tree partial signatures: map from tree position to partial sig bytes
  map<string, bytes> tree_signatures = 3;
}

message SubmitTreeSignaturesResponse {
  // Acknowledgment
  bool accepted = 1;
}

message SubmitSignedForfeitTxsRequest {
    // Signed forfeit transactions (raw hex)
  repeated string signed_forfeit_txs = 1;
  // Signed commitment transaction for boarding (optional, base64 PSBT)
  string signed_commitment_tx = 2;
}

message SubmitSignedForfeitTxsResponse {
  // Acknowledgment
  bool accepted = 1;
}

// ─────────────────────────────────────────────────────────────────────────────
// GetTransactionsStream — Go arkd parity
// ─────────────────────────────────────────────────────────────────────────────

message GetTransactionsStreamRequest {
  // Filter by scripts (optional)
  repeated string scripts = 1;
}

message TransactionEvent {
  oneof event {
    CommitmentTxEvent commitment_tx = 1;
    ArkTxEvent ark_tx = 2;
    TransactionHeartbeatEvent heartbeat = 3;
  }
}

message CommitmentTxEvent {
  string txid = 1;
  string round_id = 2;
  int64 timestamp = 3;
}

message ArkTxEvent {
  string txid = 1;
  string from_script = 2;
  string to_script = 3;
  uint64 amount = 4;
  int64 timestamp = 5;
}

message TransactionHeartbeatEvent {
  int64 timestamp = 1;
}

// ─────────────────────────────────────────────────────────────────────────────
// Extended Event Types — Go arkd parity
// ─────────────────────────────────────────────────────────────────────────────

// TreeSigningStartedEvent signals the start of MuSig2 tree signing.
// Wire-compatible with Go arkd.
message TreeSigningStartedEvent {
  string id = 1;
  repeated string cosigners_pubkeys = 2;
  string unsigned_commitment_tx = 3;
}

// TreeNoncesAggregatedEvent signals all nonces have been collected.
// Wire-compatible with Go arkd.
message TreeNoncesAggregatedEvent {
  string id = 1;
  map<string, string> tree_nonces = 2;
}

// TreeTxEvent provides an unsigned tree tx for signing.
// Wire-compatible with Go arkd.
message TreeTxEvent {
  string id = 1;
  repeated string topic = 2;
  int32 batch_index = 3;
  string txid = 4;
  string tx = 5;
  map<uint32, string> children = 6;
}

// TreeSignatureEvent provides the aggregated signature result.
// Wire-compatible with Go arkd.
message TreeSignatureEvent {
  string id = 1;
  repeated string topic = 2;
  int32 batch_index = 3;
  string txid = 4;
  string signature = 5;
}

// StreamStartedEvent acknowledges stream connection.
// Wire-compatible with Go arkd.
message StreamStartedEvent {
  string id = 1;
}

// GetEventStreamResponse wraps a RoundEvent for the GetEventStream RPC.
message GetEventStreamResponse {
  oneof event {
    BatchStartedEvent batch_started = 1;
    BatchFinalizationEvent batch_finalization = 2;
    BatchFinalizedEvent batch_finalized = 3;
    BatchFailedEvent batch_failed = 4;
    TreeSigningStartedEvent tree_signing_started = 5;
    TreeNoncesAggregatedEvent tree_nonces_aggregated = 6;
    TreeTxEvent tree_tx = 7;
    TreeSignatureEvent tree_signature = 8;
    TreeNoncesEvent tree_nonces = 9;
    Heartbeat heartbeat = 10;
    StreamStartedEvent stream_started = 11;
  }
}

// IssueAsset
message IssueAssetRequest {
  string pubkey = 1;
  uint64 amount = 2;
  string name = 3;
  string ticker = 4;
}

message IssueAssetResponse {
  string asset_id = 1;
  string txid = 2;
  repeated string issued_asset_ids = 3;
}

// ReissueAsset
message ReissueAssetRequest {
  string asset_id = 1;
  string pubkey = 2;
  uint64 amount = 3;
}

message ReissueAssetResponse {
  string txid = 1;
}

// BurnAsset
message BurnAssetRequest {
  string asset_id = 1;
  string pubkey = 2;
  uint64 amount = 3;
}

message BurnAssetResponse {
  string txid = 1;
}

// RedeemNotes
message RedeemNotesRequest {
  repeated string notes = 1;
  string pubkey = 2;
}

message RedeemNotesResponse {
  string txid = 1;
  uint64 amount_redeemed = 2;
}
