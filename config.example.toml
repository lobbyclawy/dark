# dark Configuration Example
# Copy this file to config.toml and adjust for your environment

# =============================================================================
# Server Configuration
# =============================================================================

[server]
# gRPC listen address
grpc_addr = "[::1]:50051"

# REST API listen address (optional)
rest_addr = "127.0.0.1:8080"

# Enable TLS for production
tls_enabled = false
# tls_cert_path = "/path/to/cert.pem"
# tls_key_path = "/path/to/key.pem"

# Maximum concurrent connections
max_connections = 1000

# Request timeout in seconds
request_timeout_secs = 30

# Enable request logging
enable_logging = true

# Admin API token (generate a secure random token for production)
# admin_token = "your-secure-admin-token"

# Remote signer gRPC endpoint for key isolation.
# When set, signing operations are delegated to a separate signer process.
# When unset (default), local signing is used.
# remote_signer_url = "http://127.0.0.1:7072"

# Esplora API endpoint for blockchain scanning (on-chain VTXO watching).
# When set, the server polls Esplora for script spends.
# When unset (default), no on-chain monitoring is performed.
# esplora_url = "https://blockstream.info/testnet/api"

# Hex-encoded 32-byte secret key for the ASP local signer.
# When set, the server uses LocalSigner::from_hex instead of a remote signer.
# Generate with: openssl rand -hex 32
# asp_key_hex = "e8f32e723decf4051aefac8e2c93c9c5b214313817cdb01a1494b917c8436b35"

# Deprecated ASP signer keys — hex public keys of previous ASP signers
# that should still be accepted for verification after a key rotation.
# deprecated_signer_keys = ["old-hex-key-1", "old-hex-key-2"]

# =============================================================================
# Bitcoin Configuration
# =============================================================================

[bitcoin]
# Network: mainnet, testnet, signet, regtest
network = "regtest"

# Bitcoin Core RPC
rpc_host = "127.0.0.1"
rpc_port = 18443  # regtest default
rpc_user = "dark"
rpc_password = "dark"

# Optional: Use cookie file instead of user/password
# rpc_cookie_path = "/home/bitcoin/.bitcoin/regtest/.cookie"

# Number of confirmations required
min_confirmations = 1

# Fee estimation
fee_rate_target_blocks = 6
min_fee_rate_sat_vb = 1
max_fee_rate_sat_vb = 100

# =============================================================================
# Wallet Configuration
# =============================================================================

[wallet]
# Network (should match bitcoin.network)
network = "regtest"

# Esplora API endpoint (alternative to Bitcoin Core RPC)
# esplora_url = "http://localhost:3000"

# Wallet database path
database_path = "./data/wallet.db"

# Wallet descriptor (BIP-86 Taproot recommended)
# Leave empty to generate new wallet on first run
# descriptor = "tr([fingerprint/86'/1'/0']xpub.../0/*)"
# change_descriptor = "tr([fingerprint/86'/1'/0']xpub.../1/*)"

# Address gap limit
gap_limit = 20

# Minimum confirmations for UTXO selection
min_confirmations = 1

# =============================================================================
# Database Configuration
# =============================================================================

[database]
# Backend: postgres, sqlite
backend = "sqlite"

# Connection URL
# PostgreSQL: postgres://user:password@host:port/database
# SQLite: sqlite://path/to/database.db
url = "sqlite://./data/dark.db"

# Connection pool settings
max_connections = 10
min_connections = 1
connect_timeout_secs = 30

# Run migrations on startup
run_migrations = true

# Redis cache URL (optional, recommended for production)
# redis_url = "redis://127.0.0.1:6379"

# Redis URL for ephemeral live-store (round state).
# If unset, an in-memory store is used (data lost on restart).
# live_store_redis_url = "redis://127.0.0.1:6379"

# =============================================================================
# Ark Protocol Configuration
# =============================================================================

[ark]
# Round duration in seconds
round_duration_secs = 60

# Minimum participants per round
min_participants = 2

# Maximum participants per round
max_participants = 100

# VTXO expiry time in blocks
# Network-dependent: ~24 hours on mainnet (144 blocks × 10 min), 
# ~2.4 hours on testnet/signet, instant on regtest with manual mining
vtxo_expiry_blocks = 144

# Connector output timelock in blocks
connector_timelock_blocks = 12

# Minimum VTXO amount in satoshis
min_vtxo_amount_sats = 1000

# Maximum VTXO amount in satoshis
max_vtxo_amount_sats = 100_000_000  # 1 BTC

# Minimum UTXO amount for boarding (satoshis)
utxo_min_amount = 1000

# Maximum UTXO amount for boarding (satoshis, 0 = boarding disabled)
utxo_max_amount = 100_000_000  # 1 BTC

# CSV delay for public unilateral exits (seconds, ~24 hours)
public_unilateral_exit_delay = 86400

# CSV delay for boarding inputs (seconds, ~3 months)
boarding_exit_delay = 7776000

# Maximum commitment transaction weight
max_tx_weight = 400_000

# Default fee rate in sats/vB for intent fee estimation
default_fee_rate_sats_per_vb = 1

# -----------------------------------------------------------------------------
# PSAR mode (issue #678 / ADR-0009)
# -----------------------------------------------------------------------------
# When this section is absent, every cohort runs in standard MuSig2 mode and
# the PSAR parallel pipeline is not spawned (no-op default).
#
# When present, the operator declares per-cohort overrides; cohorts not listed
# below are governed by `default_mode`. The demo binary in #680 reads this
# section to build the AspModeRegistry consumed by `dark_psar::adapter`.
# [ark.psar]
# default_mode = "standard"
#
# [[ark.psar.cohorts]]
# # 64-character lowercase hex of the 32-byte Cohort::id.
# id = "abababababababababababababababababababababababababababababababab"
# mode = "psar"
# # Hibernation horizon (ignored when mode = "standard").
# n = 12
# max_n = 24

# =============================================================================
# Logging Configuration
# =============================================================================

[logging]
# Log level: trace, debug, info, warn, error
level = "info"

# Log format: json, pretty
format = "pretty"

# Log to file
# file = "./logs/dark.log"

# =============================================================================
# Metrics Configuration
# =============================================================================

[metrics]
# Enable Prometheus metrics exposition
enabled = true

# Metrics + health endpoint listen address
# Serves /metrics (Prometheus) and /health (JSON) on this port
endpoint = "0.0.0.0:9090"

# =============================================================================
# Health Check Configuration
# =============================================================================

[health]
# Health endpoint is served on the same port as metrics (see metrics.endpoint)
# The endpoint path is /health and returns:
# {"status":"ok","version":"0.1.0","uptime_secs":...}
#
# Docker HEALTHCHECK and Kubernetes liveness probes should target:
#   curl -sf http://localhost:9090/health
#
# For Kubernetes readiness probe, use:
#   httpGet:
#     path: /health
#     port: 9090

# Use block-height-based round scheduling instead of fixed time intervals.
# allow_csv_block_type = false

# Number of blocks between round triggers when allow_csv_block_type is true.
# round_interval_blocks = 6

# ── Nostr Integration (Issue #247) ──────────────────────────────
# Uncomment to enable VTXO expiry notifications via Nostr DMs.
# [nostr]
# relay_url = "wss://relay.damus.io"
# private_key_hex = "your_32_byte_hex_private_key"
# note_uri_prefix = "ark-note"
