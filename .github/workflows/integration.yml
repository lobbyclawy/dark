name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  integration:
    name: Integration tests (regtest)
    runs-on: ubuntu-latest

    services:
      bitcoind:
        image: ruimarinho/bitcoin-core:latest
        options: >-
          --health-cmd "bitcoin-cli -regtest -rpcuser=admin1 -rpcpassword=123 getblockchaininfo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 18443:18443
        env:
          BITCOIN_EXTRA_ARGS: "-regtest -rpcallowip=0.0.0.0/0 -rpcbind=0.0.0.0 -rpcuser=admin1 -rpcpassword=123 -txindex=1 -fallbackfee=0.00001"

    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-integration-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-integration-

      - name: Build arkd
        run: cargo build --bin arkd

      - name: Run integration tests
        env:
          INTEGRATION_TEST: "1"
          BITCOIN_RPC_URL: "http://admin1:123@localhost:18443"
        run: cargo test --test integration -- --test-threads=1 --nocapture
