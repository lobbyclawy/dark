name: Integration Tests

on:
  schedule:
    - cron: "0 3 * * *"  # 3 AM UTC nightly
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  e2e:
    name: E2E tests (nigiri regtest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install nigiri
        run: |
          curl https://getnigiri.vulpem.com | bash
          echo "$HOME/.nigiri/bin" >> $GITHUB_PATH

      - name: Start nigiri
        run: |
          nigiri start --ci
          # Wait for Bitcoin Core and Esplora to be ready
          for i in $(seq 1 30); do
            BTC=$(curl -s -o /dev/null -w "%{http_code}" \
              --user admin1:123 \
              --data '{"jsonrpc":"1.0","method":"getblockchaininfo","params":[]}' \
              http://localhost:18443/)
            ESPLORA=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/blocks/tip/height)
            echo "[$i] bitcoind=$BTC esplora=$ESPLORA"
            if [ "$BTC" = "200" ] && [ "$ESPLORA" = "200" ]; then
              echo "✅ nigiri ready"
              break
            fi
            sleep 5
          done

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-e2e-

      - name: Build dark
        run: cargo build --bin dark

      - name: Run e2e tests
        env:
          INTEGRATION_TEST: "1"
          BITCOIN_RPC_URL: "http://admin1:123@localhost:18443"
          ESPLORA_URL: "http://localhost:5000"
        run: cargo test --test e2e_regtest -- --ignored --test-threads=1 --nocapture

      - name: Run integration tests
        env:
          INTEGRATION_TEST: "1"
          BITCOIN_RPC_URL: "http://admin1:123@localhost:18443"
          ESPLORA_URL: "http://localhost:5000"
        run: cargo test --test integration -- --ignored --test-threads=1 --nocapture

      - name: Stop nigiri
        if: always()
        run: nigiri stop --delete || true
