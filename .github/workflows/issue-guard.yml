name: Issue Guard

on:
  issues:
    types: [opened]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Close issues from non-collaborators
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.issue.user.login,
            }).catch(() => ({ data: { permission: 'none' } }));

            if (['admin', 'write', 'maintain'].includes(perm.permission)) {
              console.log(`✅ ${context.payload.issue.user.login} is a collaborator — issue allowed`);
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: 'This repository only accepts issues from project collaborators. Issue will be closed.'
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed'
            });

            console.log(`❌ Closed issue #${context.payload.issue.number} from ${context.payload.issue.user.login}`);
