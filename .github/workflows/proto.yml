name: Proto Lint

on:
  push:
    branches: [main]
    paths:
      - 'proto/**'
      - 'buf.yaml'
      - 'buf.work.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'proto/**'
      - 'buf.yaml'
      - 'buf.work.yaml'

jobs:
  buf:
    name: buf lint + breaking check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: bufbuild/buf-action@v1
        with:
          input: proto
          lint: true
          format: false
          breaking: true
          breaking_against: 'https://github.com/${{ github.repository }}.git#branch=main,subdir=proto'
          pr_comment: false
