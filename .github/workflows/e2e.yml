name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"  # 3 AM UTC nightly
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}-${{ github.run_id }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gate-go-e2e:
    name: Decide Go E2E parity gate
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.decision.outputs.run }}
      reason: ${{ steps.decision.outputs.reason }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect changed files for pull requests
        if: github.event_name == 'pull_request'
        run: |
          git fetch --no-tags --prune --depth=1 origin ${{ github.base_ref }}
          git diff --name-only origin/${{ github.base_ref }}...HEAD > /tmp/changed-files.txt
          echo "Changed files:"
          cat /tmp/changed-files.txt || true

      - name: Decide whether Go E2E parity must run
        id: decision
        env:
          EVENT_NAME: ${{ github.event_name }}
          LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          if [ -z "$LABELS_JSON" ] || [ "$LABELS_JSON" = "null" ]; then
            LABELS_JSON='[]'
          fi

          python3 .github/scripts/go_e2e_gate.py \
            --event-name "$EVENT_NAME" \
            --labels-json "$LABELS_JSON" \
            --changed-files-file /tmp/changed-files.txt \
            | tee /tmp/go-e2e-gate.out

          while IFS='=' read -r key value; do
            echo "$key=$value" >> "$GITHUB_OUTPUT"
          done < /tmp/go-e2e-gate.out

      - name: Gate summary
        run: |
          echo "Go E2E required: ${{ steps.decision.outputs.run }}"
          echo "Reason: ${{ steps.decision.outputs.reason }}"

  e2e:
    name: E2E tests (native Rust) [shard ${{ matrix.shard }}/3]
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - uses: actions/checkout@v4

      - name: Start regtest environment (nigiri)
        uses: vulpemventures/nigiri-github-action@v1
        with:
          use_liquid: false

      - name: Install protoc
        run: |
          PROTOC_VERSION=25.1
          curl -sSLo /tmp/protoc.zip \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          sudo unzip -o /tmp/protoc.zip -d /usr/local bin/protoc 'include/*'
          protoc --version

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: e2e-rust
          cache-on-failure: true

      - name: Build dark
        run: cargo build --bin dark

      - name: Write dark config
        run: |
          printf '%s\n' \
            '[server]' \
            'esplora_url = "http://localhost:3000"' \
            'no_macaroons = true' \
            'no_tls = true' \
            '' \
            '[bitcoin]' \
            'network = "regtest"' \
            'rpc_host = "127.0.0.1"' \
            'rpc_port = 18443' \
            'rpc_user = "admin1"' \
            'rpc_password = "123"' \
            'min_confirmations = 1' \
            '' \
            '[wallet]' \
            'network = "regtest"' \
            'esplora_url = "http://localhost:3000"' \
            'database_path = "/tmp/dark-e2e-wallet.db"' \
            'gap_limit = 20' \
            '' \
            '[database]' \
            'backend = "sqlite"' \
            'url = "sqlite:///tmp/dark-e2e.db"' \
            '' \
            '[ark]' \
            'round_duration_secs = 5' \
            'vtxo_expiry_blocks = 144' \
            'connector_timelock_blocks = 12' \
            'min_vtxo_amount_sats = 1000' \
            'max_vtxo_amount_sats = 100000000' \
            'utxo_min_amount = 1000' \
            'utxo_max_amount = 100000000' \
            'unilateral_exit_delay = 30' \
            'boarding_exit_delay = 30' \
            > /tmp/dark-e2e.toml

      - name: Start dark server
        run: |
          ./target/debug/dark \
            --config /tmp/dark-e2e.toml \
            --grpc-port 7070 \
            --admin-port 7071 \
            --log-level info \
            > /tmp/dark.log 2>&1 &
          echo $! > /tmp/dark.pid

          for i in $(seq 1 30); do
            if nc -z localhost 7070 2>/dev/null; then
              echo "✅ dark gRPC ready on :7070"
              break
            fi
            echo "Waiting for dark... ($i/30)"
            sleep 1
          done

          if ! nc -z localhost 7070 2>/dev/null; then
            echo "❌ dark failed to start:"
            cat /tmp/dark.log | tail -30
            exit 1
          fi

          # Fund the dark server wallet so it can build commitment txs
          DARK_ADDR=$(curl -s http://127.0.0.1:7071/v1/admin/wallet/address \
            -H "Authorization: Basic $(echo -n 'admin:admin' | base64)" \
            2>/dev/null | python3 -c "import json,sys; print(json.load(sys.stdin).get('address',''))" 2>/dev/null || echo "")
          if [ -n "$DARK_ADDR" ]; then
            echo "Funding dark wallet at $DARK_ADDR"
            curl -s -X POST http://admin1:123@localhost:18443 \
              -H "Content-Type: application/json" \
              -d "{\"jsonrpc\":\"1.0\",\"id\":\"fund\",\"method\":\"sendtoaddress\",\"params\":[\"$DARK_ADDR\",10.0]}"
            # Mine to confirm
            MINE_ADDR=$(curl -s -X POST http://admin1:123@localhost:18443 \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"1.0","id":"addr","method":"getnewaddress","params":[]}' | \
              python3 -c "import json,sys; print(json.load(sys.stdin)['result'])")
            curl -s -X POST http://admin1:123@localhost:18443 \
              -H "Content-Type: application/json" \
              -d "{\"jsonrpc\":\"1.0\",\"id\":\"mine\",\"method\":\"generatetoaddress\",\"params\":[6,\"$MINE_ADDR\"]}"
            echo "✅ dark wallet funded"
          else
            echo "⚠️ could not get dark wallet address (admin API may not be ready yet)"
          fi

      - name: Install cargo-nextest
        run: curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C ${CARGO_HOME:-~/.cargo}/bin

      - name: Run Rust e2e tests (shard ${{ matrix.shard }}/3)
        env:
          INTEGRATION_TEST: "1"
          BITCOIN_RPC_URL: "http://admin1:123@localhost:18443"
          ESPLORA_URL: "http://localhost:3000"
          DARK_GRPC_URL: "http://127.0.0.1:7070"
          DARK_ADMIN_URL: "http://localhost:7071"
        run: >-
          cargo nextest run
          --test e2e_regtest
          --run-ignored all
          --test-threads=1
          --no-capture
          --fail-fast
          --partition hash:${{ matrix.shard }}/3

      - name: Run integration tests
        if: matrix.shard == 1
        env:
          INTEGRATION_TEST: "1"
          BITCOIN_RPC_URL: "http://admin1:123@localhost:18443"
          ESPLORA_URL: "http://localhost:3000"
        run: cargo nextest run --test integration --run-ignored all --test-threads=1 --no-capture --fail-fast

      - name: Show dark logs on failure
        if: failure()
        run: cat /tmp/dark.log || true

      - name: Cancel workflow on failure
        if: failure()
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/cancel"

      - name: Stop dark server
        if: always()
        run: kill $(cat /tmp/dark.pid) 2>/dev/null || true

  go-e2e:
    name: E2E tests (arkd Go) [shard ${{ matrix.shard }}/3]
    needs: gate-go-e2e
    if: needs.gate-go-e2e.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          # Shards balanced by runtime measured on run 24590943659.
          # If tests are added/renamed, the "Verify shard coverage" step will fail the job.
          - shard: 1
            # ~372s: TestBan(219) + TestAsset(131) + TestSendToCLTV(12) + TestSendToCond(10)
            run_pattern: '^(TestBan|TestAsset|TestSendToCLTVMultisigClosure|TestSendToConditionMultisigClosure|TestBatchSettleMultipleClients|TestCollisionBetweenInRoundAndRedeemVtxo)$'
          - shard: 2
            # ~350s: TestSweep(205) + TestUnilateralExit(54) + TestCollaborativeExit(51) + TestFee(21) + TestDelegateRefresh(19)
            run_pattern: '^(TestSweep|TestUnilateralExit|TestCollaborativeExit|TestFee|TestDelegateRefresh)$'
          - shard: 3
            # ~378s: TestReactToFraud(143) + TestEventListenerChurn(75) + TestOffchainTx(75) + TestTxListenerChurn(39) + TestBatchSession(30) + TestIntent(16)
            run_pattern: '^(TestReactToFraud|TestEventListenerChurn|TestOffchainTx|TestTxListenerChurn|TestBatchSession|TestIntent)$'

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Explain why Go E2E is running
        run: echo "Go E2E parity gate enabled: ${{ needs.gate-go-e2e.outputs.reason }}"

      - name: Start regtest environment (nigiri)
        uses: vulpemventures/nigiri-github-action@v1
        with:
          use_liquid: false

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          cache-dependency-path: vendor/arkd/go.sum

      - name: Install protoc
        run: |
          PROTOC_VERSION=25.1
          curl -sSLo /tmp/protoc.zip \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip"
          sudo unzip -o /tmp/protoc.zip -d /usr/local bin/protoc 'include/*'
          protoc --version

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: e2e-rust
          cache-on-failure: true

      - name: Build dark
        run: cargo build --bin dark

      - name: Write dark config for Go e2e tests
        run: |
          cat > /tmp/dark-go-e2e.toml <<'EOF'
          [bitcoin]
          network = "regtest"
          rpc_host = "127.0.0.1"
          rpc_port = 18443
          rpc_user = "admin1"
          rpc_password = "123"
          min_confirmations = 1

          [wallet]
          network = "regtest"
          esplora_url = "http://localhost:3000"
          database_path = "/tmp/dark-go-e2e-wallet.db"
          gap_limit = 20

          [database]
          backend = "sqlite"
          url = "sqlite:///tmp/dark-go-e2e.db"

          [server]
          esplora_url = "http://localhost:3000"
          no_macaroons = true
          no_tls = true

          [ark]
          round_duration_secs = 5
          vtxo_expiry_blocks = 144
          connector_timelock_blocks = 12
          min_vtxo_amount_sats = 1000
          max_vtxo_amount_sats = 100000000
          utxo_min_amount = 1000
          utxo_max_amount = 100000000
          unilateral_exit_delay = 30
          boarding_exit_delay = 30
          # TEST-ENV-ONLY: hold the forfeit tx in the mempool for 5 s before
          # broadcasting, to keep a just-reacted-to fraud unconfirmed across the
          # 5 s mempool-propagation window reserved by the upstream Go E2E.
          # Production deployments leave this unset so fraud response is immediate.
          fraud_reaction_delay_secs = 5
          EOF

      - name: Start dark server
        run: |
          ./target/debug/dark \
            --config /tmp/dark-go-e2e.toml \
            --grpc-port 7070 \
            --admin-port 7071 \
            --log-level debug \
            > /tmp/dark-go-e2e.log 2>&1 &
          echo $! > /tmp/dark-go-e2e.pid

          for i in $(seq 1 60); do
            if nc -z 127.0.0.1 7070 2>/dev/null; then
              echo "✅ dark gRPC ready on :7070"
              break
            fi
            echo "Waiting for dark... ($i/60)"
            sleep 1
          done

          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:7071/v1/admin/wallet/status 2>/dev/null || echo "000")
            if [ "$STATUS" != "000" ]; then
              echo "✅ dark admin HTTP ready on :7071 (status: $STATUS)"
              break
            fi
            echo "Waiting for dark admin HTTP... ($i/10)"
            sleep 1
          done

          if ! nc -z 127.0.0.1 7070 2>/dev/null; then
            echo "❌ dark failed to start:"
            cat /tmp/dark-go-e2e.log
            exit 1
          fi

      - name: Seed and fund dark server wallet
        run: |
          BASE="http://127.0.0.1:7071"

          STATUS=$(curl -s "$BASE/v1/admin/wallet/status")
          echo "Wallet status: $STATUS"
          INITIALIZED=$(echo "$STATUS" | python3 -c "import json,sys; print(json.load(sys.stdin).get('initialized', False))" 2>/dev/null || echo "false")

          if [ "$INITIALIZED" != "True" ]; then
            SEED=$(curl -s "$BASE/v1/admin/wallet/seed" | python3 -c "import json,sys; print(json.load(sys.stdin)['seed'])")
            echo "Got seed (first word): $(echo $SEED | cut -d' ' -f1)..."
            curl -s -X POST "$BASE/v1/admin/wallet/create" \
              -H "Content-Type: application/json" \
              -d "{\"seed\": \"$SEED\", \"password\": \"password\"}"
            echo "Wallet created"
          fi

          curl -s -X POST "$BASE/v1/admin/wallet/unlock" \
            -H "Content-Type: application/json" \
            -d '{"password": "password"}'
          echo "Wallet unlocked"

          sleep 2

          ADDRESS=$(curl -s "$BASE/v1/admin/wallet/address" | python3 -c "import json,sys; print(json.load(sys.stdin)['address'])")
          echo "Dark wallet address: $ADDRESS"

          for i in $(seq 1 15); do
            nigiri faucet "$ADDRESS" 2>/dev/null || nigiri rpc sendtoaddress "$ADDRESS" 1 2>/dev/null || true
          done
          echo "Funded wallet with 15 BTC"

          nigiri rpc --generate 6
          echo "Mined 6 blocks"

          for i in $(seq 1 15); do
            BALANCE=$(curl -s "$BASE/v1/admin/wallet/balance" | \
              python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('mainAccount',{}).get('available','0'))" 2>/dev/null || echo "0")
            echo "[$i] Dark wallet balance: $BALANCE BTC"
            NONZERO=$(python3 -c "print('yes' if float('$BALANCE') > 0 else 'no')" 2>/dev/null || echo "no")
            if [ "$NONZERO" = "yes" ]; then
              echo "✅ Dark wallet funded: $BALANCE BTC"
              break
            fi
            sleep 2
          done

      - name: Start background block miner
        run: |
          while true; do
            nigiri rpc --generate 1 > /dev/null 2>&1 || true
            sleep 2
          done &
          echo $! > /tmp/block-miner.pid
          echo "✅ Background block miner started (1 block every 2s)"

      - name: Verify dark server connectivity
        run: |
          echo "=== Dark server gRPC check ==="
          nc -z 127.0.0.1 7070 && echo "gRPC port 7070: OPEN" || echo "gRPC port 7070: CLOSED"
          echo ""
          echo "=== Dark admin HTTP check ==="
          curl -s http://127.0.0.1:7071/v1/admin/wallet/status || echo "FAILED"
          echo ""
          echo "=== Dark server info (gRPC via grpcurl if available) ==="
          go install github.com/fullstorydev/grpcurl/cmd/grpcurl@latest 2>/dev/null || true
          grpcurl -plaintext 127.0.0.1:7070 ark.v1.ArkService/GetInfo 2>&1 || echo "grpcurl not available or failed"
          echo ""
          echo "=== Dark server logs (last 30 lines) ==="
          tail -30 /tmp/dark-go-e2e.log || true

      - name: Verify all Go e2e tests are assigned to a shard
        if: matrix.shard == 1
        working-directory: vendor/arkd
        # Fail the job (shard 1 only) if a new test lands without being added
        # to one of the matrix run_patterns — prevents silent skipping.
        run: |
          ALL=$(go test -list '^Test' github.com/arkade-os/arkd/internal/test/e2e 2>/dev/null | grep '^Test' | sort)
          UNION='^(TestBan|TestAsset|TestSendToCLTVMultisigClosure|TestSendToConditionMultisigClosure|TestBatchSettleMultipleClients|TestCollisionBetweenInRoundAndRedeemVtxo|TestSweep|TestUnilateralExit|TestCollaborativeExit|TestFee|TestDelegateRefresh|TestReactToFraud|TestEventListenerChurn|TestOffchainTx|TestTxListenerChurn|TestBatchSession|TestIntent)$'
          MISSING=$(echo "$ALL" | grep -Ev "$UNION" || true)
          if [ -n "$MISSING" ]; then
            echo "::error::The following Go e2e tests are not assigned to any shard:"
            echo "$MISSING"
            echo ""
            echo "Add them to go-e2e.strategy.matrix.include[*].run_pattern in .github/workflows/e2e.yml"
            exit 1
          fi
          echo "✅ All $(echo "$ALL" | wc -l) Go e2e tests are covered by a shard"

      - name: Run arkade-os/arkd Go e2e tests (shard ${{ matrix.shard }}/3)
        working-directory: vendor/arkd
        # TestSweep/with_arkd_restart requires arkd to run in a Docker
        # container — our harness runs dark as a host process, so we skip it.
        run: |
          go test -v -count 1 -timeout 3600s \
            -run '${{ matrix.run_pattern }}' \
            -skip 'TestSweep/with_arkd_restart' \
            github.com/arkade-os/arkd/internal/test/e2e

      - name: Show dark logs (full)
        if: always()
        run: |
          echo "=== FULL dark server log ==="
          wc -l /tmp/dark-go-e2e.log || true
          cat /tmp/dark-go-e2e.log || true

      - name: Cancel workflow on failure
        if: failure()
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/cancel"

      - name: Stop dark and nigiri
        if: always()
        run: |
          kill $(cat /tmp/block-miner.pid) 2>/dev/null || true
          kill $(cat /tmp/dark-go-e2e.pid) 2>/dev/null || true
          nigiri stop --delete 2>/dev/null || true
