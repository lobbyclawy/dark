name: E2E Tests (Rust)

on:
  push:
    branches: [main, "fix/**", "feat/**"]
  schedule:
    - cron: "0 3 * * *"  # 3 AM UTC nightly
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  e2e:
    name: E2E tests (nigiri regtest)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Start regtest environment (nigiri)
        uses: vulpemventures/nigiri-github-action@v1
        with:
          use_liquid: false

      - name: Mine 101 blocks for coinbase maturity
        run: |
          FUND_ADDR=$(curl -s -X POST http://admin1:123@localhost:18443 \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"1.0","id":"addr","method":"getnewaddress","params":[]}' | \
            python3 -c "import json,sys; print(json.load(sys.stdin)['result'])")
          curl -s -X POST http://admin1:123@localhost:18443 \
            -H "Content-Type: application/json" \
            -d "{\"jsonrpc\":\"1.0\",\"id\":\"mine\",\"method\":\"generatetoaddress\",\"params\":[101,\"$FUND_ADDR\"]}" > /dev/null
          sleep 5
          BAL=$(curl -s -X POST http://admin1:123@localhost:18443 \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"1.0","id":"bal","method":"getbalance","params":[]}' | \
            python3 -c "import json,sys; print(json.load(sys.stdin)['result'])")
          echo "✅ Regtest wallet balance after 101 blocks: $BAL BTC"

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install cargo-nextest
        run: curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C ${CARGO_HOME:-~/.cargo}/bin

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-e2e-

      - name: Build dark
        run: cargo build --bin dark

      - name: Write dark config
        run: |
          printf '%s\n' \
            '[bitcoin]' \
            'network = "regtest"' \
            'rpc_host = "127.0.0.1"' \
            'rpc_port = 18443' \
            'rpc_user = "admin1"' \
            'rpc_password = "123"' \
            'min_confirmations = 1' \
            '' \
            '[wallet]' \
            'network = "regtest"' \
            'esplora_url = "http://localhost:3000"' \
            'database_path = "/tmp/dark-e2e-wallet.db"' \
            'gap_limit = 20' \
            '' \
            '[database]' \
            'backend = "sqlite"' \
            'url = "sqlite:///tmp/dark-e2e.db"' \
            '' \
            '[ark]' \
            'round_duration_secs = 10' \
            'vtxo_expiry_blocks = 144' \
            'connector_timelock_blocks = 12' \
            'min_vtxo_amount_sats = 1000' \
            'max_vtxo_amount_sats = 100000000' \
            'utxo_min_amount = 1000' \
            'utxo_max_amount = 100000000' \
            > /tmp/dark-e2e.toml

      - name: Start dark server
        run: |
          ./target/debug/dark \
            --config /tmp/dark-e2e.toml \
            --grpc-port 7070 \
            --admin-port 7071 \
            --log-level info \
            > /tmp/dark.log 2>&1 &
          echo $! > /tmp/dark.pid

          for i in $(seq 1 30); do
            if nc -z localhost 7070 2>/dev/null; then
              echo "✅ dark gRPC ready on :7070"
              break
            fi
            echo "Waiting for dark... ($i/30)"
            sleep 1
          done

          if ! nc -z localhost 7070 2>/dev/null; then
            echo "❌ dark failed to start:"
            cat /tmp/dark.log | tail -30
            exit 1
          fi

      - name: Fund dark server wallet
        run: |
          DARK_ADDR=$(curl -s http://127.0.0.1:7071/v1/admin/wallet/address \
            -H "Authorization: Basic $(echo -n 'admin:admin' | base64)" \
            2>/dev/null | python3 -c "import json,sys; print(json.load(sys.stdin).get('address',''))" 2>/dev/null || echo "")

          if [ -z "$DARK_ADDR" ]; then
            echo "❌ could not get dark wallet address"
            exit 1
          fi

          echo "Funding dark wallet at $DARK_ADDR"
          TXID=$(curl -s -X POST http://admin1:123@localhost:18443 \
            -H "Content-Type: application/json" \
            -d "{\"jsonrpc\":\"1.0\",\"id\":\"fund\",\"method\":\"sendtoaddress\",\"params\":[\"$DARK_ADDR\",10.0]}" | \
            python3 -c "import json,sys; r=json.load(sys.stdin); print(r.get('result','ERROR') if not r.get('error') else 'ERROR: '+str(r['error']))")
          echo "Funding tx: $TXID"

          if [[ "$TXID" == ERROR* ]]; then
            echo "❌ Failed to fund: $TXID"
            exit 1
          fi

          # Mine to confirm
          MINE_ADDR=$(curl -s -X POST http://admin1:123@localhost:18443 \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"1.0","id":"addr","method":"getnewaddress","params":[]}' | \
            python3 -c "import json,sys; print(json.load(sys.stdin)['result'])")
          curl -s -X POST http://admin1:123@localhost:18443 \
            -H "Content-Type: application/json" \
            -d "{\"jsonrpc\":\"1.0\",\"id\":\"mine\",\"method\":\"generatetoaddress\",\"params\":[6,\"$MINE_ADDR\"]}" > /dev/null

          # Wait for esplora to index
          echo "Waiting for esplora to index..."
          sleep 20

          # Poll wallet balance until it syncs (up to 90s)
          for i in $(seq 1 30); do
            BAL=$(curl -s http://127.0.0.1:7071/v1/admin/wallet/balance \
              -H "Authorization: Basic $(echo -n 'admin:admin' | base64)" 2>/dev/null \
              | python3 -c "import json,sys; d=json.load(sys.stdin); ma=d.get('mainAccount') or d.get('main_account') or {}; print(int(ma.get('available','0') or 0))" 2>/dev/null || echo "0")
            if [ "${BAL:-0}" -gt 0 ] 2>/dev/null; then
              echo "✅ dark wallet funded and synced (balance: $BAL sats)"
              break
            fi
            echo "Waiting for wallet sync... ($i/30) balance=${BAL:-0}"
            sleep 3
          done

          if [ "${BAL:-0}" -le 0 ] 2>/dev/null; then
            echo "❌ wallet failed to sync — dark server logs:"
            cat /tmp/dark.log | tail -30
            exit 1
          fi

      - name: Run Rust e2e tests
        env:
          INTEGRATION_TEST: "1"
          BITCOIN_RPC_URL: "http://admin1:123@localhost:18443"
          ESPLORA_URL: "http://localhost:3000"
          DARK_GRPC_URL: "http://127.0.0.1:7070"
          DARK_ADMIN_URL: "http://localhost:7071"
        run: cargo nextest run --test e2e_regtest --run-ignored all --test-threads=1 --no-capture --fail-fast

      - name: Run integration tests
        env:
          INTEGRATION_TEST: "1"
          BITCOIN_RPC_URL: "http://admin1:123@localhost:18443"
          ESPLORA_URL: "http://localhost:3000"
        run: cargo nextest run --test integration --run-ignored all --test-threads=1 --no-capture --fail-fast

      - name: Show dark logs on failure
        if: failure()
        run: cat /tmp/dark.log || true

      - name: Stop dark server
        if: always()
        run: kill $(cat /tmp/dark.pid) 2>/dev/null || true
