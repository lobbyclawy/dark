[package]
name = "arkd-rs"
version = "0.1.0"
edition = "2021"
authors = ["Lobby <lobby.clawy@gmail.com>", "Andrea Carotti <ac.carotti@gmail.com>"]
description = "Rust implementation of arkd - Ark protocol server for Bitcoin Layer 2 scaling"
license = "MIT"
repository = "https://github.com/lobbyclawy/arkd-rs"

[workspace]
members = [
    "crates/arkd-core",
    "crates/arkd-wallet",
    "crates/arkd-api",
    "crates/arkd-db",
    "crates/arkd-bitcoin",
    "crates/arkd-live-store",
    "crates/arkd-scanner",
    "crates/arkd-scheduler",
    "crates/arkd-fee-manager",
]

[dependencies]
# Async runtime
tokio = { version = "1.42", features = ["full"] }

# Error handling
anyhow = "1.0"
thiserror = "2.0"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Bitcoin (core primitives)
bitcoin = { version = "0.32", features = ["rand", "serde"] }
bitcoincore-rpc = "0.19"
bdk_wallet = { version = "1.0", features = ["keys-bip39"] }  # For wallet service

# Cryptography (already via bitcoin, but explicit for secp256k1)
secp256k1 = { version = "0.29", features = ["rand"] }

# gRPC / API
tonic = "0.12"
prost = "0.13"
tonic-build = "0.12"  # For proto compilation

# Database
sqlx = { version = "0.8", features = ["postgres", "sqlite", "runtime-tokio", "macros"] }
redis = { version = "0.27", features = ["tokio-comp", "connection-manager"] }

# Configuration
config = "0.14"
clap = { version = "4.5", features = ["derive"] }

# Internal crates
arkd-api = { path = "crates/arkd-api" }
arkd-core = { path = "crates/arkd-core" }
arkd-db = { path = "crates/arkd-db" }
arkd-scheduler = { path = "crates/arkd-scheduler" }
arkd-wallet = { path = "crates/arkd-wallet" }
async-trait = "0.1"

# Utilities
hex = "0.4"
base64 = "0.22"

[dev-dependencies]
tokio-test = "0.4"
proptest = "1.5"
criterion = { version = "0.5", features = ["html_reports"] }
arkd-bitcoin = { path = "crates/arkd-bitcoin" }
bitcoin = { version = "0.32", features = ["rand", "serde"] }
secp256k1 = { version = "0.29", features = ["rand"] }
tokio = { version = "1.42", features = ["full"] }
uuid = { version = "1", features = ["v4"] }
serde_json = "1.0"

[[bin]]
name = "arkd"
path = "src/main.rs"

[[bench]]
name = "ark_benchmarks"
harness = false

[[test]]
name = "integration"
path = "tests/integration/mod.rs"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
