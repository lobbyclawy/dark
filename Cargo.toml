[package]
name = "arkd-rs"
version = "0.1.0"
edition = "2021"
authors = ["Lobby <lobby.clawy@gmail.com>", "Andrea Carotti <ac.carotti@gmail.com>"]
description = "Rust implementation of arkd - Ark protocol server for Bitcoin Layer 2 scaling"
license = "MIT"
repository = "https://github.com/lobbyclawy/arkd-rs"

[workspace]
members = [
    "crates/arkd-core",
    "crates/arkd-wallet",
    "crates/arkd-api",
    "crates/arkd-db",
    "crates/arkd-bitcoin",
]

[dependencies]
tokio = { version = "1.42", features = ["full"] }
anyhow = "1.0"
thiserror = "2.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Bitcoin
bitcoin = "0.32"
bitcoincore-rpc = "0.19"

# gRPC / API
tonic = "0.12"
prost = "0.13"

# Database
sqlx = { version = "0.8", features = ["postgres", "sqlite", "runtime-tokio"] }
redis = { version = "0.27", features = ["tokio-comp", "connection-manager"] }

# Config
config = "0.14"
dotenv = "0.15"

[dev-dependencies]
tokio-test = "0.4"

[[bin]]
name = "arkd"
path = "src/main.rs"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
