version: '3.8'

services:
  dark:
    image: ghcr.io/lobbyclawy/dark:latest
    ports:
      - "50051:50051"
    volumes:
      - ./config/dark.light.toml:/app/config.toml:ro
      - dark_data:/app/data
    environment:
      - DARK_CONFIG=/app/config.toml
    restart: unless-stopped

volumes:
  dark_data:
